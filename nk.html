<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn how Nirbhay Knitting Industries Pvt. Ltd. is evolving through knitting, coating, laminating, in-house testing, and sustainable material innovation.">
  <meta name="theme-color" content="#0A2A43">
  <title>NK — Nirbhay Knitting Industries Pvt. Ltd.</title>
  <link rel="icon" type="image/jpeg" href="assets/img/logo/nk-logo.jpg">

  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      corePlugins: { container: false },
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } } },
    };
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/about-sui-dhaga.css">
</head>
<body data-page="about">
  <div id="site-header"></div>
  <div class="page-transition">
    <main>
      
      <div id="version-sui-dhaga"></div>
    </main>
    <div id="site-footer"></div>
  </div>

  <script src="assets/js/copy-protection.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" defer></script>

  <script src="assets/js/components/header.js" defer></script>
  <script src="assets/js/components/footer.js" defer></script>
  <script src="assets/js/components/strengths-grid.js" defer></script>
  <script src="assets/js/components/about-sui-dhaga.js" defer></script>
  <script src="assets/js/components/page-banner.js" defer></script>
  <script src="assets/js/components/team-card.js" defer></script>
  <script src="assets/js/components/global-bg.js" defer></script>
  <script src="assets/js/main.js" defer></script>

  <script defer>
    document.addEventListener('DOMContentLoaded', async () => {
      const data = await loadContent();

      const headerEl = document.getElementById('site-header');
      const footerEl = document.getElementById('site-footer');
      if (headerEl && typeof renderHeader === 'function') headerEl.innerHTML = renderHeader(data);
      if (footerEl && typeof renderFooter === 'function') footerEl.innerHTML = renderFooter(data);

      const about = data.about;
      const team = data.team;

      const sharedSections = `
        ${team ? '<section class="team-section section"><div class="container"><div class="section-header" data-aos="fade-up"><h2 class="section-title">' + (team.sectionTitle || 'People and Capability') + '</h2><p class="section-subtitle">' + (team.sectionSubtitle || '') + '</p></div><div class="team-grid">' + (typeof renderTeamCards === 'function' ? renderTeamCards(team.leadership) : '') + '</div></div></section>' : ''}
      `;

      const v4El = document.getElementById('version-sui-dhaga');
      v4El.innerHTML = `
        ${typeof renderAboutJourneyV4 === 'function' ? renderAboutJourneyV4(about.journeySection) : ''}
        ${typeof renderAboutStoryV4 === 'function' && about.story ? renderAboutStoryV4(about.story) : ''}
        ${typeof renderStrengthsGrid === 'function' && about.strengths ? renderStrengthsGrid(about.strengths) : ''}
        ${sharedSections}
      `;



      const header = document.querySelector('.site-header');
      if (header) header.classList.add('hero-overlay-mode');

      initTheme();
      initMobileMenu();
      initLenis();
      initAOS();
      initGSAP();
      if (typeof initScrollToTop === 'function') initScrollToTop();
      if (typeof initGlobalBackground === 'function') initGlobalBackground();
      if (typeof initAboutJourneyV4Animations === 'function') initAboutJourneyV4Animations();
      if (typeof initStrengthsAnimations === 'function') initStrengthsAnimations();

      document.body.classList.add('loaded');
      const pt = document.querySelector('.page-transition');
      if (pt) requestAnimationFrame(() => pt.classList.add('loaded'));
    });
  </script>
</body>
</html>
