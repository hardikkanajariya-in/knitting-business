<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fire Retardant animated icon">
  <rect width="320" height="320" rx="24" fill="white"/>
  <rect x="40" y="24" width="240" height="180" rx="2" fill="#1F5FAF"/>

  <!-- Shield -->
  <g transform="translate(160 112)">
    <path d="M0 -52 L46 -34 V0 C46 34 21 58 0 70 C-21 58 -46 34 -46 0 V-34 Z"
          fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="scale" values="1;1;1.05;1;1" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Flame -->
    <path d="M0 40 C-16 40 -28 28 -28 14 C-28 -4 -14 -16 -5 -27 C-1 -19 8 -11 8 0 C13 -6 22 -8 25 -20 C37 -8 38 6 38 14 C38 28 25 40 8 40 Z"
          fill="#FFFFFF" opacity="0.95">
      <animateTransform attributeName="transform" type="scale" values="1 1;0.95 1.05;1.04 0.96;0.97 1.03;1 1"
                        dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.88;1;0.92" dur="1.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Retardant/protection pulse ring -->
  <circle cx="160" cy="112" r="68" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0;0;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="58;76;88;88;88" dur="3s" repeatCount="indefinite"/>
  </circle>

  <text x="160" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#2A2E35">
    Fire Retardant
  </text>
</svg>