<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Water Free Processing animated icon">
  <rect width="320" height="320" fill="#1F5FAF"/>

  <!-- Droplet -->
  <g transform="translate(160 160)">
    <path d="M0 -48 C-18 -24 -40 -6 -40 20 C-40 46 -22 64 0 64 C22 64 40 46 40 20 C40 -6 18 -24 0 -48 Z"
          fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linejoin="round" stroke-linecap="round"
          opacity="0">
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0.9;1;1;1;0.95" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Slash -->
    <line x1="-52" y1="52" x2="52" y2="-52" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="150" stroke-dashoffset="150">
      <animate attributeName="stroke-dashoffset" values="150;150;0;0;0" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Small sparkle to suggest clean dry process -->
  <g transform="translate(220 98)" opacity="0">
    <path d="M0 -10 L3 -3 L10 0 L3 3 L0 10 L-3 3 L-10 0 L-3 -3 Z" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;0;1;0;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0.7;0.7;1;1;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
