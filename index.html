<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nirbhay Knitting Industries Pvt. Ltd. manufactures knitted fabrics, vinyl coated textiles, PU coating and laminating solutions for industrial applications.">
  <meta name="theme-color" content="#0A2A43">
  <title>Nirbhay Knitting Industries Pvt. Ltd. — Knitted Fabrics and Coating Solutions</title>
  <link rel="icon" type="image/jpeg" href="assets/img/logo/nk-logo.jpg">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      corePlugins: { container: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- AOS CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/home-premium.css">
</head>
<body>
  <!-- Header (outside page-transition to avoid transform containing block) -->
  <div id="site-header"></div>

  <div class="page-transition">
    <!-- Page Content -->
    <main id="page-content"></main>

    <!-- Footer -->
    <div id="site-footer"></div>
  </div>

  <!-- Lenis Smooth Scroll -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>

  <!-- DotLottie Player -->
  <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- AOS JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" defer></script>

  <!-- Components -->
  <script src="assets/js/components/header.js" defer></script>
  <script src="assets/js/components/footer.js" defer></script>
  <script src="assets/js/components/hero-b.js" defer></script>
  <script src="assets/js/components/home-premium.js" defer></script>
  <script src="assets/js/components/home-interactions.js" defer></script>
  <script src="assets/js/components/product-grid.js" defer></script>
  <script src="assets/js/components/page-banner.js" defer></script>
  <script src="assets/js/components/content-block.js" defer></script>
  <script src="assets/js/components/cta-strip.js" defer></script>
  <script src="assets/js/components/team-card.js" defer></script>
  <script src="assets/js/components/contact-form.js" defer></script>

  <!-- Main JS -->
  <script src="assets/js/components/global-bg.js" defer></script>
  <script src="assets/js/main.js" defer></script>

  <!-- Page Init -->
  <script defer>
    document.addEventListener('DOMContentLoaded', () => initPage('home'));
  </script>
</body>
</html>
